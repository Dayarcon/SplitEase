name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      # ── 3. Setup Java 17 (required by Gradle) ─────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Install EAS CLI ────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ── 6. Build APK locally on GitHub's Android machine ──
      - name: Build Android APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: https://split-ease-two.vercel.app
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          eas build --platform android --profile preview --local --non-interactive 2>&1

      # ── 7. Upload APK as downloadable artifact ─────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitEase-android
          path: mobile/*.apk
          retention-days: 30

      # ── 8. Show download link ─────────────────────────────
      - name: Build complete
        run: |
          echo "✅ APK built successfully!"
          echo "📱 Download from the Actions tab → this run → Artifacts section"
